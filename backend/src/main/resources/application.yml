# resume-lcode 后端配置文件
server:
  # 后端服务端口
  port: 8080
  servlet:
    # 统一接口前缀，便于前端代理和网关转发
    context-path: /api
    session:
      # 会话有效期
      timeout: 30m
      cookie:
        # 禁止 JS 读取会话 Cookie，缓解 XSS 窃取
        http-only: true
        # 限制跨站携带，缓解 CSRF
        same-site: lax
        # 生产(HTTPS)应置 true；由环境变量控制，本地 http 开发默认 false 以便会话可用
        secure: ${SESSION_COOKIE_SECURE:false}

spring:
  application:
    # 应用名称，用于日志、监控和注册中心识别
    name: resume-lcode-backend
  # 生产 MySQL 持久化：每请求直连、真事务；凭据一律走环境变量，仓库不留明文
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:149.88.72.233}:${MYSQL_PORT:3306}/${MYSQL_DB:resume-lcode}?useUnicode=true&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&rewriteBatchedStatements=true
    username: ${MYSQL_USER:resume-lcode}
    # 密码必须由环境变量 MYSQL_PASSWORD 注入，无默认值：缺失即启动失败，避免弱口令入库
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: resume-hikari
      # 连接池按单实例中等并发配置，可按压测结果调整
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: ${DB_POOL_MIN:2}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  # Flyway：启动时按版本化脚本自动建/迁移 schema
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    default-schema: ${MYSQL_DB:resume-lcode}
  jackson:
    # 统一时间格式，避免前后端时间序列化不一致
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    # 下划线列名 -> 驼峰字段自动映射
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      # 迁移保留原有主键，主键策略用 INPUT（由代码指定 id）
      id-type: input
      # 逻辑删除等按需后续开启
    banner: false

# Swagger / OpenAPI 文档配置
springdoc:
  swagger-ui:
    # Swagger UI 访问路径：http://localhost:8080/api/swagger-ui.html
    path: /swagger-ui.html
  api-docs:
    # OpenAPI JSON 路径
    path: /v3/api-docs

# AI 大模型配置：仅后端读取，严禁在前端暴露
resume:
  ai:
    # 自定义 AI 接口地址；为空时使用本地模拟响应，便于无 Key 启动演示
    endpoint: ${RESUME_AI_ENDPOINT:}
    # 自定义 API Key；生产环境建议用环境变量或配置中心注入
    api-key: ${RESUME_AI_API_KEY:}
    # 模型名称，由后端统一传递给模型网关
    model: ${RESUME_AI_MODEL:resume-optimizer}
    # 请求超时时间，单位毫秒
    timeout-millis: 15000
  member:
    # 免费用户每日 AI 次数【会员体系预留配置】
    free-daily-ai-quota: 5
    # 免费用户每日导出次数【会员体系预留配置】
    free-daily-export-quota: 3
  system:
    # 是否启用邮箱验证注册（管理员可在后台配置）
    email-verify-enabled: false
    # 邮箱发送账号（管理员在后台配置）
    email-username: ${RESUME_EMAIL_USERNAME:}
    # 邮箱授权码（管理员在后台配置）
    email-password: ${RESUME_EMAIL_PASSWORD:}
    # 是否启用单IP登录限制
    single-ip-enabled: false
    # 每日导出次数限制（0表示不限制）
    daily-export-limit: 0
    # 是否开启会员支付功能（关闭时前端隐藏购买入口）
    payment-enabled: false
    # 是否开启模拟支付（开启后用户可一键模拟支付成功并开通会员）
    mock-payment-enabled: true
