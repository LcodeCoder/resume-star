# resume-lcode 后端配置文件
server:
  # 后端服务端口
  port: 8080
  servlet:
    # 统一接口前缀，便于前端代理和网关转发
    context-path: /api
    session:
      # 会话有效期
      timeout: 30m
      cookie:
        # 禁止 JS 读取会话 Cookie，缓解 XSS 窃取
        http-only: true
        # 限制跨站携带，缓解 CSRF
        same-site: lax
        # 生产(HTTPS)应置 true；本地 http 开发保持 false 以便会话可用
        secure: ${SERVER_COOKIE_SECURE:false}
  # 反向代理信任头：Nginx 等反代环境下正确获取客户端 IP/协议
  forward-headers-strategy: framework
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain,text/css,text/javascript
    min-response-size: 2048

spring:
  application:
    # 应用名称，用于日志、监控和注册中心识别
    name: resume-lcode-backend
  # 本地 SQLite 持久化：单文件库，零服务依赖，重启不丢数据
  datasource:
    url: jdbc:sqlite:${resume.data-dir:./data}/resume-lcode.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      # SQLite 同一时刻只允许一个写连接，连接池上限设为 1 避免写锁竞争
      maximum-pool-size: 1
      pool-name: sqlite-pool
  jackson:
    # 统一时间格式，避免前后端时间序列化不一致
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# Swagger / OpenAPI 文档配置
springdoc:
  swagger-ui:
    # Swagger UI 访问路径：http://localhost:8080/api/swagger-ui.html
    path: /swagger-ui.html
  api-docs:
    # OpenAPI JSON 路径
    path: /v3/api-docs

# AI 大模型配置：仅后端读取，严禁在前端暴露
resume:
  cors:
    # 允许跨域的来源 — 支持逗号分隔多个域名；生产务必替换为实际域名
    allowed-origins: ${RESUME_CORS_ORIGINS:http://localhost:5173,http://localhost:9998}
  ai:
    # 自定义 AI 接口地址；为空时使用本地模拟响应，便于无 Key 启动演示
    endpoint: ${RESUME_AI_ENDPOINT:}
    # 自定义 API Key；生产环境建议用环境变量或配置中心注入
    api-key: ${RESUME_AI_API_KEY:}
    # 模型名称，由后端统一传递给模型网关
    model: ${RESUME_AI_MODEL:resume-optimizer}
    # 请求超时时间，单位毫秒，支持环境变量覆盖
    timeout-millis: ${RESUME_AI_TIMEOUT:15000}
  member:
    # 免费用户每日 AI 次数【会员体系预留配置】
    free-daily-ai-quota: 5
    # 免费用户每日导出次数【会员体系预留配置】
    free-daily-export-quota: 3
  system:
    # 是否启用邮箱验证注册（管理员可在后台配置）
    email-verify-enabled: false
    # 邮箱发送账号（管理员在后台配置）
    email-username: ${RESUME_EMAIL_USERNAME:}
    # 邮箱授权码（管理员在后台配置）
    email-password: ${RESUME_EMAIL_PASSWORD:}
    # 是否启用单IP登录限制
    single-ip-enabled: false
    # 每日导出次数限制（0表示不限制）
    daily-export-limit: 0
    # 是否开启会员支付功能（关闭时前端隐藏购买入口）
    payment-enabled: false
    # 是否开启模拟支付（开启后用户可一键模拟支付成功并开通会员）
    mock-payment-enabled: true
