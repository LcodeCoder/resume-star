# resume-lcode 一键部署编排（单容器版本）
# 用法：
#   docker compose up -d --build       # 构建并后台启动
#   访问：http://localhost:9998 （前端）；后端 API：http://localhost:9999
#   停止：docker compose down          # 数据保留在 ./data 目录中
#
# 注意：
#   - 首次部署后请访问 /admin/login 修改默认管理员密码（admin/admin123）
#   - AI 功能需在后台配置真实的 API Endpoint 和 API Key

services:
  resume-lcode:
    build: .
    image: resume-lcode:latest
    container_name: resume-lcode
    ports:
      - "9998:80"     # 前端（Nginx 静态页面 + /api 反代）
      - "9999:8080"   # 后端（Spring Boot API）
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
      - SPRING_DATASOURCE_URL=jdbc:sqlite:/app/data/resume-lcode.db
    restart: unless-stopped

volumes:
  # 数据目录映射到本地 ./data，方便备份和迁移
  data:

