# resume-lcode 前端 Nginx 配置
# 功能：托管 Vue 单页应用，并把 /api 反向代理到后端容器（backend:8080）
server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/json application/javascript image/svg+xml;

    # 安全头部
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy same-origin;

    # 接口反向代理：保留 /api 前缀转发到后端（与后端 context-path 一致）
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # 透传会话 Cookie（登录态基于 HttpSession）
        proxy_pass_request_headers on;
        # 延长超时，适应 AI 长请求
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        # 上传文件大小限制
        client_max_body_size 20m;
    }

    # 单页应用前端路由：找不到文件时回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源长缓存 + 不可变文件名（vite 构建带 hash）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
    }

    # index.html 不可缓存，确保每次请求获取最新版本
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }
}